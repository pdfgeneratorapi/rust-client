[package]
name = "pdf-generator-api-client"
version = "8.0.25"
authors = ["support@pdfgeneratorapi.com"]
description = "Rust client for the PDF Generator API, auto-generated from the OpenAPI spec."
repository = "https://github.com/pdfgeneratorapi/rust-client"
homepage = "https://pdfgeneratorapi.com"
documentation = "https://docs.rs/pdf-generator-api-client"
license = "MIT"
edition = "2021"

[dependencies]
serde = { version = "^1.0", features = ["derive"] }
serde_with = { version = "^3.8", default-features = false, features = ["base64", "std", "macros"] }
serde_json = "^1.0"
serde_repr = "^0.1"
url = "^2.5"
reqwest = { version = "^0.12", default-features = false, features = ["json", "multipart"] }
